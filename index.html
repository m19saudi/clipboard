<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickClip - Secure Clipboard</title>

    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background: #f9f9f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #fff; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); padding: 30px; border-radius: 12px; max-width: 500px; width: 100%; box-sizing: border-box; }
        h1 { color: #4CAF50; font-size: 1.8rem; margin-bottom: 10px; }
        p.subtitle { color: #888; margin-bottom: 20px; font-size: 0.9rem; }
        textarea { width: 100%; height: 180px; border: 2px solid #eee; padding: 12px; font-size: 16px; border-radius: 8px; resize: none; margin-bottom: 15px; transition: 0.3s; box-sizing: border-box; }
        textarea:focus { border-color: #4CAF50; outline: none; background: #fff; }
        .button { padding: 12px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 8px; transition: 0.3s; width: 100%; font-weight: bold; }
        .button:hover { background-color: #45a049; transform: translateY(-1px); }
        .divider { margin: 25px 0; border-top: 1px solid #eee; position: relative; }
        .divider span { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #fff; padding: 0 10px; color: #aaa; font-size: 0.8rem; }
        input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #eee; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .status { font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; display: block; }
        .error { background: #ffebee; color: #c62828; display: block; }
        #current-code-display { font-weight: bold; color: #4CAF50; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickClip</h1>
    <p class="subtitle">Real-time secure clipboard</p>

    <textarea id="text" placeholder="Type or paste content here..."></textarea>
    <button class="button" id="saveBtn">Generate Cloud Link</button>

    <div class="divider"><span>OR RETRIEVE</span></div>

    <input type="text" id="clipId" placeholder="Enter 4-digit code" maxlength="4">
    <button class="button" style="background-color: #2196F3;" id="getBtn">Get Content</button>

    <div id="status" class="status"></div>
    <div id="qrcode"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
  apiKey: "AIzaSyDh8uvlYT1tCIoYiHeqOZ2lwYiOKbqv3aQ",
  authDomain: "my-quick-clip2.firebaseapp.com",
  projectId: "my-quick-clip2",
  storageBucket: "my-quick-clip2.firebasestorage.app",
  messagingSenderId: "499890221863",
  appId: "1:499890221863:web:94d67c4a23ec2a1f4eef02"
};

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentRef = null;

    // --- DOM ELEMENTS ---
    const textInput = document.getElementById("text");
    const clipInput = document.getElementById("clipId");
    const statusDiv = document.getElementById("status");
    const qrDiv = document.getElementById("qrcode");

    // --- LOGIC ---

    // Function to show status
    function showStatus(msg, type) {
        statusDiv.textContent = msg;
        statusDiv.className = `status ${type}`;
        setTimeout(() => { statusDiv.className = 'status'; }, 5000);
    }

    // Function to handle QR Code
    function generateQR(code) {
        qrDiv.innerHTML = "";
        const url = `${window.location.origin}${window.location.pathname}#${code}`;
        new QRCode(qrDiv, { text: url, width: 128, height: 128 });
    }

    // Enable Real-Time Listening
    function startListening(code) {
        if (currentRef) currentRef.off(); // Stop listening to old code
        currentRef = database.ref('clips/' + code);
        
        currentRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.text !== textInput.value) {
                textInput.value = data.text;
                showStatus("Synchronized!", "success");
            }
        });
    }

    // CREATE / SAVE
    document.getElementById("saveBtn").onclick = function() {
        const text = textInput.value;
        if (!text) return showStatus("Enter text first!", "error");

        const code = Math.floor(1000 + Math.random() * 9000).toString();
        database.ref('clips/' + code).set({
            text: text,
            timestamp: Date.now()
        }).then(() => {
            window.location.hash = code;
            showStatus(`Saved! Code: ${code}`, "success");
            generateQR(code);
            startListening(code);
        });
    };

    // RETRIEVE
    document.getElementById("getBtn").onclick = function() {
        const code = clipInput.value;
        if (!code) return showStatus("Enter a code!", "error");
        
        database.ref('clips/' + code).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                textInput.value = snapshot.val().text;
                window.location.hash = code;
                generateQR(code);
                startListening(code);
                showStatus("Content Loaded!", "success");
            } else {
                showStatus("Code not found!", "error");
            }
        });
    };

    // HANDLE URL HASH (Unique Access Handle)
    window.onload = function() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.length === 4) {
            clipInput.value = hash;
            document.getElementById("getBtn").click();
        }
    };

    // AUTO-SYNC as you type
    textInput.oninput = function() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.length === 4) {
            database.ref('clips/' + hash).set({
                text: textInput.value,
                timestamp: Date.now()
            });
        }
    };
</script>

</body>
</html>
