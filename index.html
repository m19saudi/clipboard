<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickClip - Secure Clipboard</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #4CAF50;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.5rem;
            color: #666;
        }
        textarea {
            width: 100%;
            height: 150px;
            border: 2px solid #ccc;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            resize: none;
            margin-bottom: 20px;
            transition: border 0.3s ease;
        }
        textarea:focus {
            border-color: #4CAF50;
        }
        .button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
            width: 100%;
        }
        .button:hover {
            background-color: #45a049;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 2px solid #ccc;
            margin-bottom: 20px;
        }
        input:focus {
            border-color: #4CAF50;
        }
        .status {
            font-size: 16px;
            color: #333;
            margin-top: 20px;
        }
        .status.success {
            color: green;
        }
        .status.error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QuickClip - Secure Clipboard</h1>

        <h2>Save Your Clipboard</h2>
        <textarea id="text" placeholder="Type or paste your clipboard content here..."></textarea>
        <button class="button" onclick="saveText()">Create Code</button>

        <h2>Retrieve Clipboard</h2>
        <input type="text" id="clipId" placeholder="Enter code here" />
        <button class="button" onclick="getText()">Get Text</button>

        <div id="status" class="status"></div>
    </div>

    <!-- Firebase SDK: Add this before your custom script -->
    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAVd3W7MFt6Ddq79WwxkaJ_lGTW9Hig08c",
    authDomain: "quick-clipboard.firebaseapp.com",
    projectId: "quick-clipboard",
    storageBucket: "quick-clipboard.firebasestorage.app",
    messagingSenderId: "292937997761",
    appId: "1:292937997761:web:ae94b22dc263545bf86340"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
</script>

    <!-- Custom Script for saving and retrieving data -->
    <script>
        // Save the clipboard text to Firebase
        function saveText() {
            const text = document.getElementById("text").value;
            if (!text) {
                showStatus("Please enter some text first!", "error");
                return;
            }

            // Generate a unique code (4 digit random number)
            const code = Math.floor(1000 + Math.random() * 9000).toString();

            // Save the text to Firebase Realtime Database
            set(ref(database, 'clips/' + code), {
                text: text
            })
                .then(() => {
                    showStatus(`Your code is: ${code}. Share this code to retrieve the text.`, "success");
                    document.getElementById("text").value = ""; // Clear textarea
                })
                .catch((error) => {
                    showStatus(`Error saving text: ${error.message}`, "error");
                });
        }

        // Retrieve the clipboard text using the code
        function getText() {
            const code = document.getElementById("clipId").value;
            if (!code) {
                showStatus("Please enter a valid code.", "error");
                return;
            }

            // Retrieve the text from Firebase Realtime Database
            const clipRef = ref(database, 'clips/' + code);
            get(clipRef)
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const text = snapshot.val().text;
                        showStatus(`Retrieved Text: ${text}`, "success");
                    } else {
                        showStatus("Invalid or expired code!", "error");
                    }
                })
                .catch((error) => {
                    showStatus(`Error retrieving text: ${error.message}`, "error");
                });
        }

        // Show status message
        function showStatus(message, type) {
            const statusElement = document.getElementById("status");
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
        }
    </script>

</body>
</html>
