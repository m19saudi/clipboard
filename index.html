<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickClip - Secure Sync</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="config.js"></script> 
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #4CAF50; margin-top: 0; }
        
        /* Inputs & Buttons */
        textarea { width: 100%; height: 120px; border: 2px solid #ddd; border-radius: 10px; padding: 10px; font-size: 16px; resize: none; box-sizing: border-box; transition: 0.3s; margin-bottom: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"], input[type="password"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn { background: #4CAF50; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-blue { background-color: #2196F3; margin-top: 10px; }

        /* Divider from your image */
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #888; font-size: 12px; font-weight: bold; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        .status { font-size: 13px; color: #888; margin-top: 15px; font-weight: bold; padding: 8px; border-radius: 5px; background: #f9f9f9; }
        label { display: block; text-align: left; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>QuickClip</h1>
    
    <label>Your Room Content</label>
    <textarea id="box" placeholder="Type here to sync..."></textarea>

    <div class="input-group">
        <div style="flex:1">
            <label>Room ID</label>
            <input type="text" id="myRoomId" readonly>
        </div>
        <div style="flex:1">
            <label>Set Password</label>
            <input type="password" id="myPass" placeholder="Secret" value="1234">
        </div>
    </div>
    
    <button class="btn" onclick="applySettings()">Update/Lock Room</button>

    <div class="divider"><span>OR RETRIEVE</span></div>

    <input type="text" id="clipId" placeholder="Enter 4-digit code" maxlength="4" style="width: 100%; margin-bottom: 10px; text-align: center; font-size: 18px; letter-spacing: 2px;">
    <button class="btn btn-blue" id="getBtn" onclick="joinOtherRoom()">Get Content</button>

    <div id="qrcode"></div>
    <div class="status" id="stat">Initializing...</div>
</div>

<script>
    const box = document.getElementById('box');
    const stat = document.getElementById('stat');
    const myRoomIdInput = document.getElementById('myRoomId');
    const myPassInput = document.getElementById('myPass');
    const joinInput = document.getElementById('clipId');
    
    let db;
    let currentRef = null;

    // 1. Initialize Firebase
    if (typeof firebaseConfig !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        
        // AUTO-GENERATE Room ID on load
        const autoId = Math.floor(1000 + Math.random() * 9000);
        myRoomIdInput.value = autoId;
        
        // Connect to the auto-generated room immediately
        connectToRoom(autoId, myPassInput.value);
    } else {
        stat.innerText = "Config missing!";
    }

    function connectToRoom(id, pass) {
        // Stop listening to previous room if exists
        if (currentRef) currentRef.off();

        stat.innerText = "Connecting to " + id + "...";
        const path = 'clips/' + id + '/' + pass;
        currentRef = db.ref(path);

        currentRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.text !== undefined) {
                if (data.text !== box.value) box.value = data.text;
                stat.innerText = "Synced: Room " + id;
                stat.style.color = "#4CAF50";
            } else {
                stat.innerText = "Active: Room " + id + " (Empty)";
            }
        });

        box.oninput = () => {
            stat.innerText = "Syncing...";
            currentRef.set({ text: box.value, time: Date.now() });
        };

        // Update QR
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: id.toString(), width: 128, height: 128 });
    }

    // Function for when you change your own room password
    function applySettings() {
        connectToRoom(myRoomIdInput.value, myPassInput.value);
        alert("Room " + myRoomIdInput.value + " updated with new password!");
    }

    // Function to join someone else's room
    function joinOtherRoom() {
        const targetId = joinInput.value;
        if (targetId.length < 4) {
            alert("Please enter a 4-digit code");
            return;
        }
        const pass = prompt("Enter the password for Room " + targetId + ":");
        if (pass) {
            myRoomIdInput.value = targetId;
            myPassInput.value = pass;
            connectToRoom(targetId, pass);
        }
    }
</script>
</body>
</html>
