    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="config.js"></script> 
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h1 { color: #4CAF50; margin-bottom: 0.5rem; }
        textarea { width: 100%; height: 150px; border: 2px solid #ddd; border-radius: 10px; padding: 10px; font-size: 16px; resize: none; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { border-color: #4CAF50; outline: none; }
        .btn { background: #4CAF50; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        .status { font-size: 12px; color: #888; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>QuickClip</h1>
    <p>Real-time Syncing Clipboard</p>
    <textarea id="box" placeholder="Type here to sync..."></textarea>
    <button class="btn" onclick="generateNew()">Generate New Room</button>
    <div id="qrcode"></div>
    <div class="status" id="stat">Waiting for connection...</div>
</div>

<script>
    const box = document.getElementById('box');
    const stat = document.getElementById('stat');
    let db;

    // 1. Initialize Firebase Safely
    if (typeof firebaseConfig !== 'undefined') {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        console.log("Firebase initialized successfully!");
        
        // Auto-load room from URL hash if it exists
        let roomId = window.location.hash.substring(1);
        if (roomId) {
            const pass = prompt("Enter the Room Password:");
            if (pass) {
                connectToRoom(roomId, pass);
            } else {
                stat.innerText = "Access Denied: No Password Provided";
            }
        }
    } else {
        console.error("config.js failed to load!");
        stat.innerText = "Error: Config file not found.";
    }

    function connectToRoom(id, pass) {
        window.location.hash = id;
        // The path includes the password for security
        const ref = db.ref('clips/' + id + '/' + pass);

        // Listen for changes from the database
        ref.on('value', (snap) => {
            const data = snap.val();
            if (data && data.text !== undefined) {
                if (data.text !== box.value) {
                    box.value = data.text;
                }
                stat.innerText = "Synced: Room " + id;
                stat.style.color = "#4CAF50";
            } else {
                stat.innerText = "Connected: Room " + id + " (Empty)";
                stat.style.color = "#888";
            }
        });

        // Save to database when typing
        box.oninput = () => {
            stat.innerText = "Saving...";
            stat.style.color = "#ff9800";
            
            ref.set({ 
                text: box.value, 
                time: Date.now() 
            }).then(() => {
                stat.innerText = "Synced: Room " + id;
                stat.style.color = "#4CAF50";
            }).catch((err) => {
                stat.innerText = "Security Error! Check rules/password.";
                console.error("Firebase Error:", err);
            });
        };

        // Update the QR Code
        const qrContainer = document.getElementById('qrcode');
        if (qrContainer) {
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, window.location.href);
        }
    }

    function generateNew() {
        const newId = Math.floor(1000 + Math.random() * 9000);
        const newPass = prompt("Create a password for this new room:");
        if (newPass) {
            connectToRoom(newId, newPass);
        }
    }
</script>
</body>
</html>
