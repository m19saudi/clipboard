<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickClip</title>
</head>
<body>

    <h2>QuickClip - Temporary Clipboard</h2>
    <textarea id="text" placeholder="Type something here..."></textarea><br><br>
    <button onclick="save()">Create Code</button>
    <br><br>

    <input id="clipId" placeholder="Enter code here">
    <button onclick="getClip()">Get Text</button>

    <script>
      const API = "http://localhost:5000"; // Use the backend when it's running

      async function save() {
          const text = document.getElementById("text").value;
          const res = await fetch(API + "/save", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ text })
          });
          const data = await res.json();
          alert("Your code: " + data.id);
      }

      async function getClip() {
          const id = document.getElementById("clipId").value;
          const res = await fetch(API + "/get/" + id);
          if (!res.ok) {
              alert("Not found or expired");
              return;
          }
          const data = await res.json();
          document.getElementById("text").value = data.text;
      }
    </script>

</body>
</html>
